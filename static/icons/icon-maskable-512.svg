<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9e63a5"/>
      <stop offset="100%" style="stop-color:#a3337c"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Fond plein pour maskable (safe zone = 80% central) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Sparkle principal (centré dans safe zone) -->
  <path d="M256 130 L270 220 L360 234 L270 248 L256 338 L242 248 L152 234 L242 220 Z" fill="url(#sparkle)"/>
  <!-- Petites sparkles dans safe zone -->
  <circle cx="170" cy="320" r="12" fill="#2dd4bf" opacity="0.7"/>
  <circle cx="342" cy="150" r="10" fill="#ffffff" opacity="0.8"/>
  <circle cx="350" cy="320" r="11" fill="#2dd4bf" opacity="0.6"/>
  <!-- Texte Admin -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white" opacity="0.9">ADMIN</text>
</svg>
